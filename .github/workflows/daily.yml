name: vigia-enfermeria daily

on:
  schedule:
    # Lunes-viernes a las 09:00 hora España (08:00 UTC en verano, ajustar si necesario)
    - cron: '0 8 * * 1-5'
  workflow_dispatch:
    inputs:
      since:
        description: 'Fecha de inicio YYYY-MM-DD (vacío = automático)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run (solo imprime, no notifica)'
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necesario para guardar estado en rama state

    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          # Histórico necesario para que dashboard._changelog_payload pueda
          # leer los últimos commits y publicar las FIELD NOTES en gh-pages.
          fetch-depth: 50

      - name: Restaurar BD de estado
        run: |
          mkdir -p state
          git fetch origin state --depth=1 2>/dev/null && \
            git checkout FETCH_HEAD -- state/seen.db 2>/dev/null && \
            echo "BD de estado restaurada" || \
            echo "Sin estado previo — se creará nueva BD"

      - name: Restaurar último snapshot del dashboard
        # Trae `sources_status.json` desde gh-pages para que el primer
        # `dashboard.export_all` (sin probe_results) entre al branch
        # `elif sources_path.exists()` y refresque total_hits sin perder
        # los campos del último probe. Si el `--probe` posterior funciona
        # bien, sobrescribirá este snapshot con datos vivos. Si falla
        # (continue-on-error: true), al menos no degradamos la sección.
        run: |
          mkdir -p docs/data
          if git fetch origin gh-pages --depth=1 2>/dev/null && \
             git checkout FETCH_HEAD -- data/sources_status.json 2>/dev/null && \
             [ -f data/sources_status.json ]; then
            mv data/sources_status.json docs/data/sources_status.json
            rmdir data 2>/dev/null || true
            echo "Snapshot sources_status.json restaurado desde gh-pages"
          else
            echo "Sin snapshot previo en gh-pages — el primer probe lo creará"
          fi

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar tests
        run: python -m pytest tests/ -v --tb=short

      - name: Ejecutar pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Opcional: si no está configurada, el enricher se salta sin fallar.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.since }}" ]; then
            ARGS="--since ${{ github.event.inputs.since }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m vigia.main $ARGS

      - name: Probe de salud de fuentes
        # Se ejecuta siempre (incluso si el pipeline falla) para diagnóstico.
        # No corta el workflow aunque alguna fuente esté "error" — solo informa.
        if: always()
        continue-on-error: true
        run: python -m vigia.main --probe

      - name: Guardar BD de estado
        if: always()
        run: |
          if [ ! -f state/seen.db ]; then
            echo "No hay BD que guardar"
            exit 0
          fi

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Guardar DB en rama orphan "state"
          cp state/seen.db /tmp/seen.db
          git fetch origin state --depth=1 2>/dev/null || true

          if git ls-remote --heads origin state | grep -q state; then
            git checkout -B _state_tmp FETCH_HEAD
          else
            git checkout --orphan _state_tmp
            git rm -rf . --quiet 2>/dev/null || true
          fi

          mkdir -p state
          cp /tmp/seen.db state/seen.db
          git add state/seen.db
          git diff --staged --quiet || \
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push origin _state_tmp:state
          git checkout "${{ github.sha }}" --quiet 2>/dev/null || \
            git checkout main --quiet 2>/dev/null || true
          git branch -D _state_tmp 2>/dev/null || true

      - name: Publicar dashboard en gh-pages
        # Sube web/* (index.html, styles.css, app.js) y docs/data/*.json a
        # la rama gh-pages, dejándola lista para servir desde GitHub Pages.
        # Se ejecuta siempre porque queremos refrescar el estado de las
        # fuentes incluso si el pipeline principal falló.
        if: always()
        run: |
          HAS_DATA="0"
          HAS_WEB="0"
          [ -d docs/data ] && [ -n "$(ls -A docs/data 2>/dev/null)" ] && HAS_DATA="1"
          [ -d web ] && [ -n "$(ls -A web 2>/dev/null)" ] && HAS_WEB="1"
          if [ "$HAS_DATA" = "0" ] && [ "$HAS_WEB" = "0" ]; then
            echo "No hay nada que publicar (ni docs/data ni web/)"
            exit 0
          fi

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Empaquetamos los assets antes del checkout, que sobreescribe el árbol.
          rm -rf /tmp/dashboard-data /tmp/dashboard-web
          [ "$HAS_DATA" = "1" ] && cp -r docs/data /tmp/dashboard-data
          [ "$HAS_WEB" = "1" ] && cp -r web /tmp/dashboard-web

          git fetch origin gh-pages --depth=1 2>/dev/null || true

          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git checkout -B _pages_tmp FETCH_HEAD
          else
            git checkout --orphan _pages_tmp
            git rm -rf . --quiet 2>/dev/null || true
          fi

          # data/: contenido fresco del último run (probe + items).
          if [ "$HAS_DATA" = "1" ]; then
            mkdir -p data
            rm -rf data/*
            cp -r /tmp/dashboard-data/* data/
          fi

          # web/: assets estáticos copiados a la raíz del sitio.
          if [ "$HAS_WEB" = "1" ]; then
            cp /tmp/dashboard-web/* . 2>/dev/null || true
          fi

          # .nojekyll evita que GitHub Pages intente procesar con Jekyll.
          touch .nojekyll

          git add -A
          git diff --staged --quiet || \
            git commit -m "dashboard: $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push origin _pages_tmp:gh-pages
          git checkout "${{ github.sha }}" --quiet 2>/dev/null || \
            git checkout main --quiet 2>/dev/null || true
          git branch -D _pages_tmp 2>/dev/null || true
